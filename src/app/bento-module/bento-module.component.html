<section class="bento-module">
  <app-header class="header" (search)="onSearch($event)"></app-header>

  <app-bento-box
    class="bento-box"
    [data]="data"
    [fillers]="fillers || []"
    [options]="options"
    (selectedItemChange)="onSelectedItemChange($event)"
  ></app-bento-box>

  @if (toolbar) {
  <app-bento-toolbar
    [data]="data"
    [options]="options"
    [selectedItem]="selectedItem || null"
    (addItem)="onAddItem($event)"
    (deleteItem)="onDeleteItem($event)"
    (moveItem)="onMoveItem($event)"
  >
  </app-bento-toolbar>
  }
</section>
